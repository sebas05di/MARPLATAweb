services:
  - type: web
    name: marplata
    env: python
    plan: free
    autoDeploy: true
    healthCheckPath: /health/
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --access-logfile -"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: marplata-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "marplata.onrender.com,.onrender.com,marplata.com,www.marplata.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://marplata.onrender.com,https://marplata.com,https://www.marplata.com"
      - key: SITE_URL
        value: "https://marplata.onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"
      # ---- Optional: set these in the Render dashboard if you use them ----
      - key: MARPLATA_WHATSAPP_NUMBER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: marplata-db
    plan: free
    databaseName: marplata
    user: marplata
