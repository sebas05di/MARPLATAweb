<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 0; font-family: sans-serif; }
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.cell { position: relative; height: 500px; overflow: hidden; background: #2C3E50; }
.cell img { width: 100%; height: 100%; object-fit: cover; }
.label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-size: 12px; }
</style>
</head>
<body>
<div class="compare">
  <div class="cell"><span class="label">SALO2 (current)</span><img src="/static/img/hero/hero-home-salo2.jpg"></div>
  <div class="cell"><span class="label">SALOPRINCIPAL v1 (centered)</span><img src="/static/img/hero/hero-home-v1.jpg"></div>
  <div class="cell"><span class="label">SALOPRINCIPAL v2 (sky+more)</span><img src="/static/img/hero/hero-home-v2.jpg"></div>
  <div class="cell"><span class="label">SALOPRINCIPAL v3 (body+more)</span><img src="/static/img/hero/hero-home-v3.jpg"></div>
</div>
</body>
</html>
